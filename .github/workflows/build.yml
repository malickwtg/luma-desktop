name: build

# Release builds are TAG-triggered (v0.1.0, ...). Manual via workflow_dispatch.
# v0.1.0 builds an UNSIGNED macOS arm64 .dmg that loads luma.waytogrow.es with
# the assistant overlay mounted. Follow-ups (own commits): Windows + universal
# mac, code-signing/notarization (needs Apple certs), and bundling the Agent SDK
# sidecar so the chat runs end-to-end (see README → Packaging).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build & release (unsigned arm64 .dmg)
        uses: tauri-apps/tauri-action@v0
        env:
          # Updater signing (optional; safe to leave unset for unsigned v0.1.0).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS signing/notarization (set these secrets to ship a signed build).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LUMA Desktop ${{ github.ref_name }}"
          releaseBody: "Build arm64 sin firmar. macOS bloqueará al abrir: clic derecho sobre LUMA.app → Abrir. Carga luma.waytogrow.es con el asistente montado."
          releaseDraft: false
          prerelease: true
          args: "--target aarch64-apple-darwin"
