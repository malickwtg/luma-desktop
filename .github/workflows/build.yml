name: build

# Release builds are TAG-triggered (v0.1.0, ...). Manual via workflow_dispatch.
# v0.1.0 builds an UNSIGNED macOS arm64 .dmg that loads luma.waytogrow.es with
# the assistant overlay mounted. Follow-ups (own commits): Windows + universal
# mac, code-signing/notarization (needs Apple certs), and bundling the Agent SDK
# sidecar so the chat runs end-to-end (see README → Packaging).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json "packageManager" (don't also pass
      # a `version` input — action-setup@v4 errors on the conflict).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # No signing env vars → tauri builds an UNSIGNED (ad-hoc) .app + .dmg.
      # Passing empty APPLE_* secrets makes the bundler attempt codesign and fail
      # ("failed to import keychain certificate"). To ship signed later, add the
      # APPLE_* / TAURI_SIGNING_* secrets and re-introduce them here as `env:`.
      - name: Build & release (unsigned arm64 .dmg)
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LUMA Desktop ${{ github.ref_name }}"
          releaseBody: "Build arm64 sin firmar. macOS bloqueará al abrir: clic derecho sobre LUMA.app → Abrir. Carga luma.waytogrow.es con el asistente montado."
          releaseDraft: false
          prerelease: true
          args: "--target aarch64-apple-darwin"
