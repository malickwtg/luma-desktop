<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUMA</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0b0c;
        color: #e7e7ea;
        font:
          15px/1.5 -apple-system,
          system-ui,
          sans-serif;
        display: grid;
        place-items: center;
      }
      .box {
        text-align: center;
      }
      .spin {
        width: 28px;
        height: 28px;
        margin: 0 auto 14px;
        border: 3px solid #2a2a2e;
        border-top-color: #6aa8ff;
        border-radius: 50%;
        animation: r 0.8s linear infinite;
      }
      @keyframes r {
        to {
          transform: rotate(360deg);
        }
      }
      a {
        color: #6aa8ff;
      }
    </style>
  </head>
  <body>
    <!-- Shown only if the remote LUMA web fails to load (no network, host down).
         The main window normally loads https://luma.waytogrow.es directly. -->
    <div class="box">
      <div class="spin"></div>
      <div>Conectando con LUMA…</div>
      <div style="margin-top: 8px; font-size: 13px; color: #9a9aa0">
        Si no carga, revisa tu conexión o ve a
        <a href="https://luma.waytogrow.es">luma.waytogrow.es</a>
      </div>
    </div>
  </body>
</html>
